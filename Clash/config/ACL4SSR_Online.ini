custom_proxy_group=🤖 X`select`[]🚀 节点选择`[]🇹🇼 台湾节点`[]🇯🇵 日本节点`[]🇺🇸 美国节点`[]🇭🇰 香港节点`[]🇸🇬 狮城节点`[]♻️ 自动选择
custom_proxy_group=📹 油管视频`select`[]🚀 节点选择`[]♻️ 自动选择`[]🎯 全球直连`.*
custom_proxy_group=🤖 AI`select`[]🚀 节点选择`[]🇹🇼 台湾节点`[]🇯🇵 日本节点`[]🇺🇸 美国节点`[]🇭🇰 香港节点`[]🇸🇬 狮城节点`[]♻️ 自动选择
