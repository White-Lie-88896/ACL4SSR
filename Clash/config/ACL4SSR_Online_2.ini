[custom]
; =========================
; ACL4SSR 规则 - 自选入口与落地融合配置版
; =========================
; 去广告：支持
; 自动测速：支持
; 微软分流：支持
; 苹果分流：支持
; =========================
enable_rule_generator=true
overwrite_original_rules=true
; 仅排除 IPv6 节点，保留所有的 SS 和 Landing 落地节点
exclude_remarks=(V6|v6)
; =========================
; 🔹 特殊服务规则
; =========================
ruleset=🏦 Bank HK,https://raw.githubusercontent.com/White-Lie-88896/ACL4SSR/refs/heads/master/Clash/Ruleset/BankHK.list
ruleset=💹 Broker-HK,https://raw.githubusercontent.com/White-Lie-88896/ACL4SSR/refs/heads/master/Clash/Broker-HK.list
ruleset=💹 Broker-US,https://raw.githubusercontent.com/White-Lie-88896/ACL4SSR/refs/heads/master/Clash/Broker-US.list
ruleset=💹 Crypto Coin,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Crypto.list
ruleset=📹 油管视频,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/YouTube.list
ruleset=🤖 AI,https://raw.githubusercontent.com/White-Lie-88896/ACL4SSR/refs/heads/master/Clash/Ruleset/AI.list
ruleset=🤖 X,https://raw.githubusercontent.com/White-Lie-88896/ACL4SSR/refs/heads/master/Clash/Ruleset/Twitter.list
ruleset=📡 Google,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Google.list
ruleset=📡 API,https://raw.githubusercontent.com/White-Lie-88896/ACL4SSR/refs/heads/master/Clash/Ruleset/API.list
ruleset=📱 APNS,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Surge/Apple/Apple_All_No_Resolve.list
; =========================
; 🌐 核心规则集
; =========================
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/UnBan.list
ruleset=🛑 全球拦截,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanAD.list
ruleset=🍃 应用净化,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanProgramAD.list
; =========================
; 📺 流媒体规则
; =========================
ruleset=🎥 奈飞视频,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Netflix.list
ruleset=🎥 奈飞视频,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/AmazonIp.list
ruleset=🎥 奈飞视频,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/Netflix/Netflix.list
; =========================
; 🔧 应用服务规则
; =========================
ruleset=📢 谷歌FCM,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/GoogleFCM.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/GoogleCN.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/SteamCN.list
ruleset=🪟 微软服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Microsoft.list
ruleset=🍎 苹果服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Apple.list
ruleset=📲 电报信息,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Telegram.list
; =========================
; 🌍 代理规则
; =========================
ruleset=🌍 国外媒体,https://raw.githubusercontent.com/White-Lie-88896/ACL4SSR/refs/heads/master/Clash/ProxyMedia.list
ruleset=🚀 节点选择,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyLite.list
; =========================
; 🇨🇳 国内直连规则
; =========================
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaCompanyIp.list
ruleset=🎯 全球直连,[]GEOIP,CN
ruleset=🐟 漏网之鱼,[]FINAL
; =========================
; 🔹 自选入口与自选落地核心池 (共享全局自选入口)
; =========================
; 1. 🚀 自选入口组（包含全局自动选择，和所有直连 TCP / XHTTP / WS / REALITY 节点）
custom_proxy_group=🚀 中转入口`select`[]♻️ 自动选择`TCP|XHTTP|WS|REALITY`false
; 2. 🌍 落地出口组（包含订阅里所有的 SS 和 Landing 落地节点，供您自由挑选出口）
custom_proxy_group=🌍 落地出口`select`SS|Landing`false
; 3. 🔗 自由中转链 (由您选择的 [🚀 中转入口] ➡️ 转发给您选择的 [🌍 落地出口])
custom_proxy_group=🔗 中转中转`relay`[]🚀 中转入口`[]🌍 落地出口`false
; =========================
; 🧩 策略组定义（保持简洁，增加自选直连与自由中转链）
; =========================
; 主核心开关组 (包含全部直连区、家宽组、自选中转链和 .* 匹配)
custom_proxy_group=🚀 节点选择`select`[]♻️ 自动选择`[]DIRECT`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇯🇵 日本直连`[]🇹🇼 台湾节点`[]🇹🇼 台湾直连`[]🇹🇼 台湾家宽`[]🇺🇸 美国节点`[]🇺🇸 美国直连`[]🇺🇸 美国家宽`[]🇬🇧 英国节点`[]🇬🇧 英国直连`[]🇩🇪 德国节点`[]🇩🇪 德国直连`[]🇸🇬 狮城节点`[]🔗 中转中转`.*
; 全局测速自动选择组
custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,50
