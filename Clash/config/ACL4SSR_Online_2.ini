custom_proxy_group=🎥 奈飞视频`select`[]🚀 节点选择`[]🇹🇼 台湾节点`[]🇹🇼 台湾直连`[]🇹🇼 台湾家宽`[]🇯🇵 日本节点`[]🇯🇵 日本直连`[]🇺🇸 美国节点`[]🇺🇸 美国直连`[]🇺🇸 美国家宽`[]🇭🇰 香港节点`[]🇸🇬 狮城节点`[]🌍 落地节点`[]♻️ 自动选择

; 应用服务策略组
