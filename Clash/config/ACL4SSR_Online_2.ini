; 兜底与拦截核心组
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 节点选择`[]🎯 全球直连`[]♻️ 自动选择`.*
custom_proxy_group=🎯 全球直连`select`[]DIRECT`[]🚀 节点选择`[]♻️ 自动选择
custom_proxy_group=🛑 全球拦截`select`[]REJECT`[]DIRECT
custom_proxy_group=🍃 应用净化`select`[]REJECT`[]DIRECT

; =========================
; 地区节点直连策略组 (直连节点单选，自动过滤掉 SS / Landing 落地避免连接失败)
; =========================
custom_proxy_group=🇭🇰 香港节点`select`^(?!.*(Landing|-[Ss][Ss]))(港|HK|Hong Kong|HongKong|hongkong).*(TCP|XHTTP)
custom_proxy_group=🇯🇵 日本节点`select`^(?!.*(Landing|-[Ss][Ss]))(日本|川日|东京|大阪|泉日|埼玉|沪日|深日|[^-]日|JP|Japan).*(TCP|XHTTP)
custom_proxy_group=🇹🇼 台湾节点`select`^(?!.*(Landing|-[Ss][Ss]))(台|新北|彰化|TW|Taiwan|HINET).*(TCP|XHTTP|WS)
custom_proxy_group=🇺🇸 美国节点`select`^(?!.*(Landing|-[Ss][Ss]))((美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States).*(TCP|XHTTP)|BandwagonHost)
custom_proxy_group=🇬🇧 英国节点`select`^(?!.*(Landing|-[Ss][Ss]))(英|UK|United Kingdom|LYUK).*(TCP|XHTTP)
custom_proxy_group=🇩🇪 德国节点`select`^(?!.*(Landing|-[Ss][Ss]))(德|DE|Germany|BRDE).*(XHTTP|WS)
custom_proxy_group=🇸🇬 狮城节点`select`^(?!.*(Landing|-[Ss][Ss]))(新加坡|坡|狮城|SG|Singapore)

; =========================
; 专属家宽中转组 (共享您选定的 [🚀 中转节点]，后台自动链式)
; =========================
custom_proxy_group=🇹🇼 台湾家宽`relay`[]🚀 中转节点`HINET-SS`false
custom_proxy_group=🇺🇸 美国家宽`relay`[]🚀 中转节点`FRONTIER-SS`false

; 油管专属中转组
custom_proxy_group=🎥 油管专属`relay`[]🚀 中转节点`YouTube`false
