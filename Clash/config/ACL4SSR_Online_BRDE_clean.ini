; =========================
; 🧩 Policy groups - clean layout
; =========================
; Design notes:
; - SS nodes are landing-only and require relay chaining. They are excluded from service groups.
; - US Residential = USAK-FRONTIER direct-entry nodes.
; - Taiwan Residential = HINET direct-entry nodes.
; - BandwagonHost / VLESS+REALITY US nodes are treated as US VPS, not residential.

custom_proxy_group=🚀 节点选择`select`[]♻️ Auto`[]🛟 Fallback`[]🇺🇸 US Residential`[]🇹🇼 Taiwan Residential`[]🇺🇸 US VPS`[]🇯🇵 Japan`[]🇬🇧 UK`[]🇩🇪 Germany`[]DIRECT`(XHTTP|WS-CDN|TCP|US.*BandwagonHost|BandwagonHost.*US|DC[0-9]+-US|US.*VLESS.*REALITY)
custom_proxy_group=♻️ Auto`url-test`(XHTTP|WS-CDN|TCP|US.*BandwagonHost|BandwagonHost.*US|DC[0-9]+-US|US.*VLESS.*REALITY)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🛟 Fallback`fallback`(XHTTP|WS-CDN|TCP|US.*BandwagonHost|BandwagonHost.*US|DC[0-9]+-US|US.*VLESS.*REALITY)`http://www.gstatic.com/generate_204`300,,50

