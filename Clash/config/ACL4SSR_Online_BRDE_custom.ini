[custom]
; =========================
; ACL4SSR 规则 - BRDE/LY/HINET/USAK 节点定制版
; =========================
; 去广告：支持
; 自动测速：支持
; 微软分流：支持
; 苹果分流：支持
; Node mapping: BRDE / WWHK / LYUK / LYJP / AKTW / AKHK / HINET / USAK / JPRF / BandwagonHost
; SS nodes are landing-only and require relay chaining; they are excluded from service groups.
; Residential groups: US Residential = USAK-FRONTIER, Taiwan Residential = HINET
; =========================
enable_rule_generator=true
overwrite_original_rules=true

; =========================
; 🔹 特殊服务规则
; =========================
