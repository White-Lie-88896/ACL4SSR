; =========================

; 全局自动中转入口（自动挑选延迟最低的直连节点）
custom_proxy_group=⚡ 自动入口`url-test`TCP|XHTTP|WS|REALITY`http://cp.cloudflare.com/generate_204`300,,50

; 各地区直连节点单选组（基于您的正则匹配，提取能直连的 TCP / XHTTP / WS 节点）
custom_proxy_group=🇯🇵 日本直连`select`(日本|川日|东京|大阪|泉日|埼玉|沪日|深日|[^-]日|JP|Japan).*(TCP|XHTTP)`false
custom_proxy_group=🇹🇼 台湾直连`select`(台|新北|彰化|TW|Taiwan).*(TCP|XHTTP|WS)`false
custom_proxy_group=🇺🇸 美国直连`select`(美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States).*(TCP|XHTTP)|BandwagonHost`false
custom_proxy_group=🇬🇧 英国直连`select`(英|UK|United Kingdom|LYUK).*(TCP|XHTTP)`false
custom_proxy_group=🇩🇪 德国直连`select`(德|DE|Germany|BRDE).*(XHTTP|WS)`false

